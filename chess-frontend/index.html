<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessMaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="logo">♞ ChessMaster</div>
  <div class="status-pill" id="statusPill">● Offline</div>
</header>

<main>
  <div class="board-section">
    <div class="board-wrapper">
      <div class="coord-col" id="rankCoords"></div>
      <div style="display:flex;flex-direction:column;gap:0;">
        <div class="chess-board" id="board"></div>
        <div class="coord-row" id="fileCoords"></div>
      </div>
    </div>
    <div class="message-bar" id="messageBar">Inicie uma nova partida para jogar.</div>
  </div>

  <div class="side-panel">
    <div class="panel-card">
      <div class="panel-label">Vez de jogar</div>
      <div class="turn-indicator">
        <div class="turn-dot" id="turnDot"></div>
        <div class="panel-value" id="currentPlayer">—</div>
      </div>
    </div>

    <div class="panel-card">
      <div class="panel-label">Turno</div>
      <div class="panel-value turn-count" id="turnCount">—</div>
    </div>

    <div class="panel-card">
      <div class="panel-label">Capturadas — Brancas</div>
      <div class="captured-list" id="capturedWhite"></div>
    </div>

    <div class="panel-card">
      <div class="panel-label">Capturadas — Pretas</div>
      <div class="captured-list" id="capturedBlack"></div>
    </div>

    <button class="action-btn primary" id="newGameBtn">Nova Partida</button>
    <button class="action-btn" id="resignBtn" disabled>Abandonar</button>
  </div>
</main>

<div class="overlay" id="startOverlay">
  <div class="overlay-card">
    <h2>ChessMaster</h2>
    <p>Xadrez clássico, direto do seu backend Java.</p>
    <button class="action-btn primary" id="startBtn" style="margin-top:8px;">Iniciar Partida</button>
  </div>
</div>

<div class="overlay" id="checkmateOverlay" style="display:none;">
  <div class="overlay-card">
    <h2>Xeque-mate!</h2>
    <p id="winnerText">Brancas vencem.</p>
    <button class="action-btn primary" id="rematchBtn">Revanche</button>
  </div>
</div>

<div class="overlay" id="promotionOverlay" style="display:none;">
  <div class="overlay-card">
    <h2 style="font-size:1.3rem;color:var(--text);">Promoção do Peão</h2>
    <p>Escolha a peça:</p>
    <div class="promotion-grid">
      <button class="promo-btn" data-piece="Q">♛</button>
      <button class="promo-btn" data-piece="R">♜</button>
      <button class="promo-btn" data-piece="B">♝</button>
      <button class="promo-btn" data-piece="N">♞</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
